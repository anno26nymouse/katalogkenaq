<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management E-Catalog Ikan - Ken Aquatic</title>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary-dark: #12232e;
            --accent-color: #00d4ff;
            --light-blue: #e3f2fd;
            --danger-color: #e74c3c;
            --success-color: #27ae60;
            --border-color: #ddd;
            --wa-green: #25D366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background-color: #d8d8d8; 
            padding-bottom: 120px; 
            min-height: 100vh;
        }

        header {
            background-image: linear-gradient(rgba(18, 35, 46, 0.4), rgba(18, 35, 46, 0.7)), url('ombak.jpg'); 
            background-size: cover;
            background-position: center;
            color: white; 
            padding: 1rem 0.5rem 0.5rem 0.5rem; 
            text-align: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: sticky; 
            top: 0;
            z-index: 1000;
        }

        .header-title-container {
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 40px; 
            margin-bottom: 10px;
        }

        header h1 {
            font-size: clamp(1.8rem, 5vw, 1.9rem);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            letter-spacing: 1px;
        }

        .brand-logo {
            width: 65px; 
            height: 65px; 
            border-radius: 50%; 
            border: 2px solid var(--accent-color);
            object-fit: cover;
        }

        .typing-container {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem; 
            color: white;
            height: 1.5rem; 
            margin-bottom: 10px;
            transition: all 0.5s ease;
            overflow: hidden;
        }
        .cursor { animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        nav { 
            display: flex; 
            justify-content: center; 
            gap: 8px; 
            flex-wrap: wrap; 
            margin-top: 5px;
            padding-bottom: 5px;
        }
        nav button {
            background: rgba(255,255,255,0.1); border: 1px solid var(--accent-color); color: white;
            padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; transition: 0.3s;
        }
        nav button.active { background: var(--accent-color); border-color: white; font-weight: bold; }

        main { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        
        #filter-section { 
            background: white; 
            padding: 15px; 
            border-radius: 12px; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #filter-section input {
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
            width: 100%;
        }

        .curtain-item { background: white; border: 1px solid var(--border-color); border-radius: 12px; margin-bottom: 12px; overflow: hidden; transition: 0.3s; }
        .curtain-item.out-of-stock { background-color: #2c2c2c !important; color: #999; }
        .curtain-item.out-of-stock .price-tag { color: #888; }

        .curtain-header { padding: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .price-tag { color: var(--success-color); font-weight: bold; }
        
        .curtain-content { 
            max-height: 0; 
            overflow: hidden; 
            transition: max-height 0.5s ease-in-out;
            background: rgba(0, 212, 255, 0.07);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .curtain-item.active .curtain-content { max-height: 1500px; }
        .product-desc { font-size: 0.95rem; color: #333; margin: 10px 0; line-height: 1.5; }
        .curtain-item.out-of-stock .product-desc { color: #888; }
        
        .inner-padding { padding: 20px; text-align: center; }

        .media-container { width: 100%; margin-bottom: 15px; display: flex; justify-content: center; }
        .media-container img { width: 180px; height: auto; border-radius: 8px; object-fit: cover; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .media-container .plyr { width: 100%; max-width: 100%; border-radius: 8px; }

        /* TOMBOL BELI SLIM */
        .btn-buy-wa {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--wa-green);
            color: white;
            text-decoration: none;
            padding: 4px 10px; 
            border-radius: 20px; 
            font-weight: 600;
            font-size: 0.8rem; 
            transition: 0.3s;
            margin-top: 8px;
        }

        /* FLOATING BUTTON POSISI NAIK */
        .fab-container {
            position: fixed;
            bottom: 110px; 
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 2000;
        }
        .fab {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            font-size: 22px;
            transition: 0.3s;
        }
        .fab-wa { background-color: #25D366; }
        .fab-loc { background-color: #4285F4; }
        .fab:hover { transform: scale(1.1); }
/* Pastikan video tidak lari saat di-zoom dan matikan gesture bawaan browser */
.js-player video {
    touch-action: none; /* Penting: mematikan scroll browser saat menyentuh video */
    transition: transform 0.1s ease-out;
    transform-origin: center; /* Zoom mulai dari tengah */
}


        footer { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            background: var(--primary-dark); 
            color: white; 
            text-align: center; 
            padding: 20px; 
            font-size: 1rem; 
            font-weight: 500;
            z-index: 900; 
            border-top: 2px solid var(--accent-color);
        }
        
        .lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; justify-content: center; align-items: center; }
        .lightbox.show { display: flex; }

        /* Mencegah overflow saat zoom video di fullscreen */
        .plyr--fullscreen-fallback video {
            transition: transform 0.1s ease-out;
        }
    </style>
</head>
<body>

<header>
    <div class="header-title-container">
        <img src="logo-header.jpg" class="brand-logo" alt="Logo">
        <h1>KEN AQUATIC CATALOG</h1>
    </div>
    
    <div class="typing-container" id="type-box">
        <span id="typed-text"></span><span class="cursor" id="cursor-el">_</span>
    </div>

    <nav id="category-nav">
        <button class="active" onclick="setCategory('ikan', this)">Ikan</button>
        <button onclick="setCategory('pakan', this)">Pakan</button>
        <button onclick="setCategory('peralatan', this)">Peralatan</button>
            <button onclick="setCategory('media', this)"
            >Media</button>
            <button onclick="setCategory('aquarium', this)">Aquarium</button>
            <button onclick="setCategory('pancing', this)">Pancing</button>
    </nav>
</header>

<main>
    <section id="filter-section">
        <label style="white-space: nowrap;">Harga Maks (Rp):</label>
        <input type="text" id="priceInput" maxlength="9" placeholder="Contoh: 10.000" oninput="handlePriceInput(this)">
    </section>
    <div id="product-display"></div>
</main>

<div class="fab-container">
    <a href="https://wa.me/628123456789" target="_blank" class="fab fab-wa" title="WhatsApp Kami">
        <i class="fab fa-whatsapp"></i>
    </a>
    <a href="https://maps.google.com" target="_blank" class="fab fab-loc" title="Lokasi Toko">
        <i class="fas fa-map-marker-alt"></i>
    </a>
</div>

<footer>© 2026 Ken Aquatic - Quality Fish Store - Best Service</footer>

<div id="lightbox" class="lightbox" onclick="this.classList.remove('show')">
    <img id="lightbox-img" src="" style="max-width:90%;">
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
    // Gantilah link ini dengan link "Publish to Web" (CSV) dari Google Sheets milikmu
const sheetURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT1TaODR0pcKlFZFvXyqUomKjjGRKdU6EBl1GA0CUQXwR8nC8lZRECOdcZuAR4kVkF8WM-GcOfGGpbo/pub?gid=0&single=true&output=csv';

let products = []; // Mulai dengan array kosong

// Fungsi untuk mengambil data dari Google Sheets
function fetchInventory() {
    Papa.parse(sheetURL, {
        download: true,
        header: true,
        dynamicTyping: true,
        complete: function(results) {
            // Kita ubah format data CSV agar sesuai dengan struktur media
            products = results.data.map(row => ({
                id: row.id,
                name: row.name,
                category: row.category,
                price: row.price,
                stock: row.stock,
                desc: row.desc,
                media: {
                    type: row.type, // 'image' atau 'video'
                    url: row.url
                }
            }));
            render(); // Jalankan fungsi render setelah data berhasil diambil
        }
    });
}


    let currentCat = 'ikan';
    let currentMaxPrice = 10000000; 
    const myWhatsApp = "628123456789"; 

    function handlePriceInput(el) {
        let rawValue = el.value.replace(/\D/g, "");
        if (rawValue.length > 7) rawValue = rawValue.substring(0, 7);
        currentMaxPrice = rawValue ? parseInt(rawValue) : 0;
        el.value = rawValue.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        render();
    }

    function render() {
        const display = document.getElementById('product-display');
        const filterSection = document.getElementById('filter-section');
        
        filterSection.style.display = (currentCat === 'ikan') ? 'flex' : 'none';
        display.innerHTML = '';

        let filtered = products.filter(p => p.category === currentCat && (currentCat !== 'ikan' || p.price <= currentMaxPrice));
        
        filtered.forEach(p => {
            let mediaHtml = p.media.type === 'video' 
                ? `<video class="js-player" playsinline controls><source src="${p.media.url}" type="video/mp4" /></video>`
                : `<img src="${p.media.url}" onclick="openLightbox('${p.media.url}')">`;

            const waMessage = encodeURIComponent(`Halo Ken Aquatic, apakah ${p.name} (Rp ${p.price.toLocaleString('id-ID')}) masih ada?`);
            const waLink = `https://wa.me/${myWhatsApp}?text=${waMessage}`;
            const stockClass = p.stock <= 0 ? 'out-of-stock' : '';

            display.innerHTML += `
                <div class="curtain-item ${stockClass}" id="prod-${p.id}">
                    <div class="curtain-header" onclick="toggleCurtain(${p.id})">
                        <h4>${p.name} ${p.stock <= 0 ? '(HABIS)' : ''}</h4>
                        <span class="price-tag">Rp ${p.price.toLocaleString('id-ID')}</span>
                    </div>
                    <div class="curtain-content">
                        <div class="inner-padding">
                            <div class="media-container">${mediaHtml}</div>
                            <p class="product-desc"><i>${p.desc}</i></p>
                            <p><b>Stok:</b> ${p.stock} pcs</p>
                            <a href="${waLink}" target="_blank" class="btn-buy-wa">
                                <i class="fab fa-whatsapp" style="margin-right:8px"></i> Beli Sekarang
                            </a>
                        </div>
                    </div>
                </div>`;
        });

        // Inisialisasi Plyr
        const players = Plyr.setup('.js-player', {
            fullscreen: { enabled: true, fallback: true, iosNative: true }
        });

        players.forEach(player => {
            player.on('enterfullscreen', event => {
                const container = event.target; 
                const video = container.querySelector('video');
                if(video) {
                    video.style.transition = "transform 0.1s ease-out";
                    initZoom(container, video);
                }
            });

            player.on('exitfullscreen', event => {
                const video = event.target.querySelector('video');
                if(video) {
                    video.style.transform = "translate(0px, 0px) scale(1)";
                    if(video.hammertime) video.hammertime.destroy();
                }
            });
        }); // SEBELUMNYA ERROR DI SINI
    }

    function initZoom(proxyElement, targetVideo) {
        const mc = new Hammer.Manager(proxyElement);
        const pinch = new Hammer.Pinch();
        const pan = new Hammer.Pan({ direction: Hammer.DIRECTION_ALL, threshold: 0 });

        pan.recognizeWith(pinch);
        mc.add([pinch, pan]);

        let lastScale = 1, currentScale = 1;
        let lastPosX = 0, lastPosY = 0, currentPosX = 0, currentPosY = 0;

        mc.on('pinchmove', (e) => {
            currentScale = lastScale * e.scale;
            if (currentScale < 1) currentScale = 1;
            if (currentScale > 5) currentScale = 5;
            updateTransform();
        });

        mc.on('pinchend', () => { lastScale = currentScale; });

        mc.on('panmove', (e) => {
            if (currentScale > 1) {
                currentPosX = lastPosX + e.deltaX;
                currentPosY = lastPosY + e.deltaY;
                updateTransform();
            }
        });

        mc.on('panend', () => {
            lastPosX = currentPosX;
            lastPosY = currentPosY;
        });

        function updateTransform() {
    if (currentScale <= 1) {
        // Jika tidak di-zoom, kembalikan ke tengah
        currentPosX = 0;
        currentPosY = 0;
    } else {
        // 1. Hitung batas maksimal geser (Boundary)
        // proxyElement adalah kontainer video (layar fullscreen)
        const stageW = proxyElement.clientWidth;
        const stageH = proxyElement.clientHeight;

        const maxPosX = (stageW * currentScale - stageW) / 2;
        const maxPosY = (stageH * currentScale - stageH) / 2;

        // 2. Clamp / Batasi posisi X
        if (currentPosX > maxPosX) currentPosX = maxPosX;
        if (currentPosX < -maxPosX) currentPosX = -maxPosX;

        // 3. Clamp / Batasi posisi Y
        if (currentPosY > maxPosY) currentPosY = maxPosY;
        if (currentPosY < -maxPosY) currentPosY = -maxPosY;
    }

    targetVideo.style.transform = `translate(${currentPosX}px, ${currentPosY}px) scale(${currentScale})`;
}

        targetVideo.hammertime = mc;
    }

    function toggleCurtain(id) {
        const item = document.getElementById(`prod-${id}`);
        const isActive = item.classList.contains('active');
        document.querySelectorAll('.curtain-item').forEach(i => i.classList.remove('active'));
        if (!isActive) item.classList.add('active');
    }

    function openLightbox(url) {
        document.getElementById('lightbox-img').src = url;
        document.getElementById('lightbox').classList.add('show');
    }

    function setCategory(cat, btn) {
        currentCat = cat;
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    // Efek Mengetik
    const textToType = "soal Channa, tidak usah ditanya, disini tempatnya"; 
    const typedTextElement = document.getElementById('typed-text');
    const typeBox = document.getElementById('type-box');
    let charIndex = 0;

    function typeEffect() {
        if (charIndex < textToType.length) {
            typedTextElement.textContent += textToType.charAt(charIndex);
            charIndex++;
            setTimeout(typeEffect, 70);
        } else {
            setTimeout(() => {
                typeBox.style.height = "0";
                typeBox.style.margin = "0";
                typeBox.style.opacity = "0";
            }, 4000);
        }
    }

    window.onload = () => {
    typeEffect();
    fetchInventory(); // Panggil fungsi penarik data Sheets, bukan render() langsung
};

</script>


</body>
</html>
