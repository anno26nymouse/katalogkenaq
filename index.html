<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ken Aquatic Catalog</title>

<style>
:root {
    --primary-dark:#12232e;
    --accent-color:#00d4ff;
    --border-color:#ddd;
    --success-color:#27ae60;
    --wa-green:#25D366;
    --location-blue: #3498db;
}

body {
    margin:0;
    font-family:sans-serif;
    background:#d8d8d8;
    padding-bottom: 60px; /* Ruang untuk footer */
}

/* ================= HEADER MODERN ================= */
header {
    background: linear-gradient(rgba(18,35,46,0.6), rgba(18,35,46,0.9)),
    url('https://images.unsplash.com/photo-1518020382113-a7e8fc38eac9?auto=format&fit=crop&w=800&q=80');
    background-size:cover;
    background-position:center;
    color:white;
    padding:15px;
    text-align:center;
    position:sticky;
    top:0;
    z-index:1000;
    backdrop-filter: blur(6px);
}

.header-title {
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
}

.logo {
    width:50px;
    height:50px;
    border-radius:50%;
    background:url('logo-header.jpg');
    background-size:cover;
    border:2px solid var(--accent-color);
}

.typing-box {
    margin-top:10px;
    font-family:monospace;
}

.cursor {
    animation: blink 1s infinite;
}
@keyframes blink {
    0%,100%{opacity:1}
    50%{opacity:0}
}

/* NAV */
nav {
    margin-top:10px;
}

nav button {
    background:transparent;
    border:1px solid var(--accent-color);
    color:white;
    padding:5px 10px;
    border-radius:20px;
    margin:3px;
    cursor:pointer;
    transition: 0.3s;
}

nav button.active {
    background:var(--accent-color);
    font-weight:bold;
    color: var(--primary-dark);
}

/* ================= SKELETON ================= */
.skeleton {
    background: linear-gradient(90deg,#eee,#f5f5f5,#eee);
    background-size:200% 100%;
    animation: shimmer 1.2s infinite;
    border-radius:8px;
}
@keyframes shimmer {
    0%{background-position:-200%}
    100%{background-position:200%}
}

.skeleton-card {
    background:white;
    margin:10px;
    padding:15px;
    border-radius:12px;
}

.skeleton-media {
    aspect-ratio:1/1;
    margin-top:10px;
}

/* ================= PRODUCT ================= */
#product-display {
    padding-bottom: 20px;
}

.curtain-item {
    background:white;
    margin:10px;
    border-radius:12px;
    overflow:hidden;
    transition: background 0.3s;
}

/* Tambahan: Tampilan jika stok 0 (Abu-abu) */
.curtain-item.out-of-stock {
    background: #cccccc;
    filter: grayscale(0.8);
    opacity: 0.8;
}

.curtain-header {
    padding:15px;
    display:flex;
    justify-content:space-between;
    cursor:pointer;
}

.curtain-content {
    max-height:0;
    overflow:hidden;
    transition:0.3s;
}

.curtain-item.active .curtain-content {
    max-height:1000px;
}

.btn-buy-wa {
    display:inline-block;
    background:var(--wa-green);
    color:white;
    padding:10px 20px;
    border-radius:20px;
    text-decoration:none;
    margin-top:10px;
    font-weight: bold;
}

/* ================= FLOATING BUTTONS ================= */
.floating-container {
    position: fixed;
    bottom: 80px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    z-index: 2000;
}

.float-btn {
    width: 55px;
    height: 55px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    text-decoration: none;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    font-size: 24px;
    transition: transform 0.2s;
}

.float-btn:active {
    transform: scale(0.9);
}

.float-wa { background-color: var(--wa-green); }
.float-loc { background-color: var(--location-blue); }

/* ================= FOOTER ================= */
footer {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: var(--primary-dark);
    color: white;
    text-align: center;
    padding: 12px 0;
    font-size: 13px;
    z-index: 1000;
    border-top: 2px solid var(--accent-color);
}
</style>
</head>

<body>

<header>
    <div class="header-title">
        <div class="logo"></div>
        <h2>KEN AQUATIC</h2>
    </div>

    <div class="typing-box" id="type-box">
        <span id="typed-text"></span><span class="cursor">_</span>
    </div>

    <nav>
        <button class="active" onclick="setCategory('ikan',this)">Ikan</button>
        <button onclick="setCategory('pakan',this)">Pakan</button>
        <button onclick="setCategory('peralatan',this)">Peralatan</button>
        <button onclick="setCategory('media',this)">Media</button>
 <button onclick="setCategory('aquarium',this)">Aquarium</button>
 <button onclick="setCategory('pancing',this)">Pancing</button>
  </nav>
</header>

<div id="product-display"></div>

<div class="floating-container">
    <a href="https://wa.me/628123456789" class="float-btn float-wa" title="Hubungi Kami">
        <span>💬</span>
    </a>
    <a href="https://maps.google.com/?q=Purwokerto" target="_blank" class="float-btn float-loc" title="Lokasi Kami">
        <span>📍</span>
    </a>
</div>

<footer>
    &copy; 2026 Ken Aquatic - Purwokerto & Purbalingga
</footer>

<script>
const sheetURL = 'https://opensheet.elk.sh/1F-Zjv-THQiZ6Hb6_NQULE7q1QYmlxcG47-6UV63AC2o/Sheet1';
let products = [];
let currentCategory = "ikan";

/* ================= TYPING ================= */
const text = "Selamat datang di Ken Aquatic 🐟";
let i = 0;

function typeEffect(){
    if(i < text.length){
        document.getElementById("typed-text").textContent += text[i];
        i++;
        setTimeout(typeEffect,50);
    } else {
        setTimeout(hideTyping,5000);
    }
}

function hideTyping(){
    const box = document.getElementById("type-box");
    box.style.transition="0.5s";
    box.style.opacity="0";
    box.style.transform="translateY(-10px)";
    setTimeout(()=> box.style.display="none",500);
}

typeEffect();

/* ================= NAV LOGIC ================= */
function setCategory(category, element) {
    currentCategory = category.toLowerCase();
    
    // Ubah status tombol aktif
    document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active'));
    element.classList.add('active');
    
    render();
}

/* ================= SKELETON ================= */
function showSkeleton(){
    let html = "";
    for(let i=0;i<5;i++){
        html += `
        <div class="skeleton-card">
            <div class="skeleton" style="height:14px;width:60%"></div>
            <div class="skeleton" style="height:14px;width:30%;margin-top:5px"></div>
            <div class="skeleton skeleton-media"></div>
        </div>`;
    }
    document.getElementById("product-display").innerHTML = html;
}

/* ================= FETCH ================= */
function fetchInventory(isSilent=false){
    if(!isSilent) showSkeleton();

    fetch(sheetURL)
    .then(res => res.json())
    .then(data => {
      products = data.map(item => {
    const rawPrice = item.price ? item.price.toString() : "0";

    return {
        name: item.name || "Produk Tanpa Nama",
        category: (item.category || "").toLowerCase().trim(),
        price: Number(rawPrice.replace(/\D/g,'')) || 0,
        stock: Number((item.stock || "").toString().replace(/\D/g,'')) || 0,
        desc: item.desc || "",
        url: item.url || "https://via.placeholder.com/150"
    };
});

        render();
    })
    .catch(err => {
        console.error("Gagal mengambil data:", err);
    });
}

/* ================= RENDER ================= */
function render(){
    const display = document.getElementById("product-display");
    let filtered = products.filter(p => p.category === currentCategory);

    if(filtered.length === 0){
        display.innerHTML = `<p style="text-align:center; padding:50px; color:#666;">Produk kosong di kategori ${currentCategory}.</p>`;
        return;
    }

    display.innerHTML = filtered.map((p) => {
        // Cek jika stok kosong
        const isOutOfStock = p.stock <= 0;
        const cardClass = isOutOfStock ? "curtain-item out-of-stock" : "curtain-item";
        const stockStatus = isOutOfStock ? "HABIS" : p.stock;

        return `
        <div class="${cardClass}">
            <div class="curtain-header" onclick="toggleItem(this)">
                <span style="font-weight:bold">${p.name} ${isOutOfStock ? '(Habis)' : ''}</span>
                <span style="color:green; font-weight:bold">Rp ${p.price.toLocaleString('id-ID')}</span>
            </div>
            <div class="curtain-content">
                <div style="padding:15px; text-align:center">
                    <img src="${p.url}" style="width:100%; max-width:250px; border-radius:8px; border: 1px solid #eee;">
                    <div style="margin-top:10px; font-size:13px; color:#555;">
                        Stok: <b>${stockStatus}</b>
                    </div>
                    <div style="margin-top:5px; margin-bottom:15px; color:#333;">
                        ${p.desc}
                    </div>
                    ${!isOutOfStock ? `
                        <a class="btn-buy-wa" href="https://wa.me/628123456789?text=Halo, saya ingin beli ${p.name}">
                            Beli via WhatsApp
                        </a>
                    ` : '<p style="color:red; font-weight:bold;">Produk Sementara Tidak Tersedia</p>'}
                </div>
            </div>
        </div>
        `;
    }).join("");
}

/* ================= TOGGLE ================= */
function toggleItem(el){
    const item = el.closest('.curtain-item');
    const isActive = item.classList.contains("active");

    // Tutup semua yang lain
    document.querySelectorAll(".curtain-item").forEach(i => i.classList.remove("active"));

    // Buka jika sebelumnya tidak aktif
    if(!isActive) item.classList.add("active");
}

/* ================= INIT ================= */
fetchInventory(); 

// Update otomatis setiap 60 detik tanpa menampilkan skeleton (silent update)
setInterval(() => fetchInventory(true), 60000);
</script>

</body>
</html>
