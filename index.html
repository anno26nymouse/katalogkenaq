<!DOCTYPE html>
<html lang="id">
<head>
  <!-- Cloudflare Web Analytics --><script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "c7528b4cf7354650aec5b75cbd89323f"}'></script><!-- End Cloudflare Web Analytics -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ken Aquatic Catalog</title>

<style>
:root {
    --primary-dark:#12232e;
    --accent-color:#00d4ff;
    --border-color:#ddd;
    --success-color:#27ae60;
    --wa-green:#25D366;
    --location-blue: #3498db;
}

body {
    margin:0;
    font-family:sans-serif;
    background:#d8d8d8;
    padding-bottom: 60px; /* Ruang untuk footer */
}

/* ================= HEADER MODERN ================= */
header {
    background: linear-gradient(rgba(18,35,46,0.6), rgba(18,35,46,0.9)),
    url('ombak.jpg');
    background-size:cover;
    background-position:center;
    color:white;
    gap:1px;
    text-align:center;
    position:sticky;
    top:0;
    z-index:1000;
    backdrop-filter: blur(6px);
    display: flex;
    flex-direction: column;
    align-items: center;
}

.header-title {
    margin: 0;
}

.typing-box {
    margin: 0;
}

nav {
    margin: 0;
}
.header-title {
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    font-size: 20px;
}

.logo {
    width:50px;
    height:50px;
    border-radius:50%;
    background:url('logo-header.jpg');
    background-size:cover;
    border:2px solid var(--accent-color);
}
.header-title h2 {
    font-weight:900; /* super bold */
    letter-spacing:3px; /* biar lebih tegas */
    text-shadow: 0 2px 4px rgba(0,0,0,0.6); /* efek tegas */
}
.typing-box {
    margin-top:2px;
    font-size:12px;
    font-weight:900; /* lebih tebal */
    letter-spacing:0.5px;
    color:#e0f7ff; /* biar lebih kontras */
    font-family:monospace;
    text-shadow: 0 1px 3px rgba(0,0,0,0.7);
    transition: all 0.3s ease;

}

.cursor {
    animation: blink 1s infinite;
}
@keyframes blink {
    0%,100%{opacity:1}
    50%{opacity:0}
}

/* NAV */
nav {
    margin-top:10px;
}

nav button {
    background:transparent;
    border:1px solid var(--accent-color);
    color:white;
    padding:5px 10px;
    border-radius:20px;
    margin:3px;
    cursor:pointer;
    transition: 0.3s;
}

nav button.active {
    background:var(--accent-color);
    font-weight:bold;
    color: var(--primary-dark);
}

/* ================= SKELETON ================= */
.skeleton {
    background: linear-gradient(90deg,#eee,#f5f5f5,#eee);
    background-size:200% 100%;
    animation: shimmer 1.2s infinite;
    border-radius:8px;
}
@keyframes shimmer {
    0%{background-position:-200%}
    100%{background-position:200%}
}

.skeleton-card {
    background:white;
    margin:10px;
    padding:15px;
    border-radius:12px;
}

.skeleton-media {
    aspect-ratio:1/1;
    margin-top:10px;
}

/* ================= PRODUCT ================= */
#product-display {
    padding-bottom: 20px;
}

.curtain-item {
    background:white;
    margin:10px;
    border-radius:12px;
    overflow:hidden;
    transition: background 0.3s;
}

/* Tambahan: Tampilan jika stok 0 (Abu-abu) */
.curtain-item.out-of-stock {
    background: #cccccc;
    filter: grayscale(0.8);
    opacity: 0.8;
}

.curtain-header {
    padding:15px;
    display:flex;
    justify-content:space-between;
    cursor:pointer;
}

.curtain-content {
    max-height:0;
    overflow:hidden;
    transition:0.3s;
}

.curtain-item.active .curtain-content {
    max-height:1000px;
}

.btn-buy-wa {
    display:inline-block;
    background:var(--wa-green);
    color:white;
    padding:10px 20px;
    border-radius:20px;
    text-decoration:none;
    margin-top:10px;
    font-weight: bold;
}

/* ================= FLOATING BUTTONS ================= */
.floating-container {
    position: fixed;
    bottom: 80px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    z-index: 2000;
}

.float-btn {
    width: 55px;
    height: 55px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    text-decoration: none;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    font-size: 24px;
    transition: transform 0.2s;
}

.float-btn:active {
    transform: scale(0.9);
}

.float-wa { background-color: var(--wa-green); }
.float-loc { background-color: var(--location-blue); }

/* ================= FOOTER ================= */
footer {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: var(--primary-dark);
    color: white;
    text-align: center;
    padding: 12px 0;
    font-size: 13px;
    z-index: 1000;
    border-top: 2px solid var(--accent-color);
}
/* MODAL PRATINJAU */
#preview-modal {
    display: none;
    position: fixed;
    z-index: 3000;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
    overflow: hidden;
    touch-action: none; /* Penting untuk gesture custom */
}

#preview-content {
    max-width: 95%;
    max-height: 80%;
    transition: transform 0.1s ease-out;
    transform-origin: center center;
}

.close-preview {
    position: absolute;
    top: 20px; right: 20px;
    color: white;
    font-size: 30px;
    cursor: pointer;
    z-index: 3001;
}

</style>
</head>

<body>

<header>
    <div class="header-title">
        <div class="logo" onclick="openPreview('logo-header.jpg', 'img')"></div>
        <h2>KEN AQUATIC</h2>
    </div>

    <div class="typing-box" id="type-box">
        <span id="typed-text"></span><span class="cursor">_</span>
    </div>

    <nav>
        <button class="active" onclick="setCategory('ikan',this)">Ikan</button>
        <button onclick="setCategory('pakan',this)">Pakan</button>
        <button onclick="setCategory('peralatan',this)">Peralatan</button>
        <button onclick="setCategory('media',this)">Media</button>
 <button onclick="setCategory('aquarium',this)">Aquarium</button>
 <button onclick="setCategory('pancing',this)">Pancing</button>
  </nav>
</header>

<div id="product-display"></div>

<div class="floating-container">
    <a href="https://wa.me/6283878843262" class="float-btn float-wa" title="Hubungi Kami">
        <span>💬</span>
    </a>
    <a href="https://maps.app.goo.gl/2swyzGusJoKJqBTEA" target="_blank" class="float-btn float-loc" title="Lokasi Kami">
        <span>📍</span>
    </a>
</div>

<footer>
    &copy; 2026 Ken Aquatic - Dusun 2, Selaganggeng, rt3 rw5, Kabupaten Purbalingga, Jawa Tengah 53352
</footer>
<div id="preview-modal">
    <span class="close-preview" onclick="closePreview()">&times;</span>
    <div id="preview-container">
        </div>
</div>


<script>
const sheetURL = 'https://opensheet.elk.sh/1F-Zjv-THQiZ6Hb6_NQULE7q1QYmlxcG47-6UV63AC2o/Sheet1';
let products = [];
let currentCategory = "ikan";

/* ================= TYPING ================= */
const text = "Soal Channa, tidak perlu ditanya, disini tempatnya";
let i = 0;

function typeEffect(){
    if(i < text.length){
        document.getElementById("typed-text").textContent += text[i];
        i++;
        setTimeout(typeEffect,50);
    } else {
        setTimeout(hideTyping,5000);
    }
}

function hideTyping(){
    const box = document.getElementById("type-box");

    box.style.height = "0";
    box.style.margin = "0";
    box.style.padding = "0";
    box.style.opacity = "0";
    box.style.overflow = "hidden";

    setTimeout(()=>{
        box.style.display = "none";
    }, 300);
}

typeEffect();

/* ================= NAV LOGIC ================= */
function setCategory(category, element) {
    currentCategory = category.toLowerCase();
    
    // Ubah status tombol aktif
    document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active'));
    element.classList.add('active');
    
    render();
}

/* ================= SKELETON ================= */
function showSkeleton(){
    let html = "";
    for(let i=0;i<5;i++){
        html += `
        <div class="skeleton-card">
            <div class="skeleton" style="height:14px;width:60%"></div>
            <div class="skeleton" style="height:14px;width:30%;margin-top:5px"></div>
            <div class="skeleton skeleton-media"></div>
        </div>`;
    }
    document.getElementById("product-display").innerHTML = html;
}

/* ================= FETCH ================= */
function fetchInventory(isSilent=false){
    if(!isSilent) showSkeleton();

    fetch(sheetURL)
    .then(res => res.json())
    .then(data => {
      products = data.map(item => {
    const rawPrice = item.price ? item.price.toString() : "0";

    return {
        name: item.name || "Produk Tanpa Nama",
        category: (item.category || "").toLowerCase().trim(),
        price: Number(rawPrice.replace(/\D/g,'')) || 0,
        stock: Number((item.stock || "").toString().replace(/\D/g,'')) || 0,
        desc: item.desc || "",
        url: item.url || "https://via.placeholder.com/150"
    };
});

        render();
    })
    .catch(err => {
        console.error("Gagal mengambil data:", err);
    });
}

/* ================= RENDER (VERSI PERBAIKAN) ================= */
function render(){
    const display = document.getElementById("product-display");
    let filtered = products.filter(p => p.category === currentCategory);

    if(filtered.length === 0){
        display.innerHTML = `<p style="text-align:center; padding:50px; color:#666;">Produk kosong di kategori ${currentCategory}.</p>`;
        return;
    }

    display.innerHTML = filtered.map((p) => {
        const isOutOfStock = p.stock <= 0;
        const cardClass = isOutOfStock ? "curtain-item out-of-stock" : "curtain-item";
        const stockStatus = isOutOfStock ? "HABIS" : p.stock;

        // --- LOGIKA DETEKSI MEDIA ---
        let mediaHtml = "";
        const url = p.url.toLowerCase();

if (url.includes("youtube.com") || url.includes("youtu.be")) {
    const videoId = url.includes("v=") 
        ? url.split('v=')[1]?.split('&')[0] 
        : url.split('/').pop();

    mediaHtml = `<iframe width="100%" height="200"
        src="https://www.youtube.com/embed/${videoId}"
        frameborder="0" allowfullscreen
        style="border-radius:8px;"></iframe>`;
}
else if (url.match(/\.(mp4|webm|mov)$/)) {
    mediaHtml = `<video controls onclick="openPreview('${p.url}', 'video')"
        style="width:100%; max-width:250px; border-radius:8px;">
        <source src="${p.url}">
    </video>`;
}
else {
    mediaHtml = `<img src="${p.url}"
        onclick="openPreview('${p.url}', 'img')"
        style="width:100%; max-width:250px; border-radius:8px;">`;
}

        return `
        <div class="${cardClass}">
            <div class="curtain-header" onclick="toggleItem(this)">
                <span style="font-weight:bold">${p.name} ${isOutOfStock ? '(Habis)' : ''}</span>
                <span style="color:green; font-weight:bold">Rp ${p.price.toLocaleString('id-ID')}</span>
            </div>
            <div class="curtain-content">
                <div style="padding:15px; text-align:center">
                    ${mediaHtml} <div style="margin-top:10px; font-size:13px; color:#555;">
                        Stok: <b>${stockStatus}</b>
                    </div>
                    <div style="margin-top:5px; margin-bottom:15px; color:#333;">
                        ${p.desc}
                    </div>
                    ${!isOutOfStock ? `
                        <a class="btn-buy-wa" href="https://wa.me/6283878843262?text=Halo, saya ingin beli ${p.name}">
                            Tanya ?
                        </a>
                    ` : '<p style="color:red; font-weight:bold;">Produk Sementara Tidak Tersedia</p>'}
                </div>
            </div>
        </div>
        `;
    }).join("");
}


/* ================= TOGGLE ================= */
function toggleItem(el){
    const item = el.closest('.curtain-item');
    const isActive = item.classList.contains("active");

    // Tutup semua yang lain
    document.querySelectorAll(".curtain-item").forEach(i => i.classList.remove("active"));

    // Buka jika sebelumnya tidak aktif
    if(!isActive) item.classList.add("active");
}

/* ================= INIT ================= */
fetchInventory(); 

// Update otomatis setiap 60 detik tanpa menampilkan skeleton (silent update)
setInterval(() => fetchInventory(true), 60000);
let modal = document.getElementById('preview-modal');
let container = document.getElementById('preview-container');
let scale = 1;
let lastDist = 0;
let lastScale = 1;

function openPreview(src, type) {
    modal.style.display = 'flex';
    scale = 1; // Reset zoom
    let content = "";
    
    if (type === 'img') {
        content = `<img src="${src}" id="preview-content" style="transform: scale(1)">`;
    } else {
        content = `<video src="${src}" id="preview-content" controls autoplay style="transform: scale(1)"></video>`;
    }
    
    container.innerHTML = content;
    initZoom();
}

function closePreview() {
    modal.style.display = 'none';
    container.innerHTML = "";
}

function initZoom() {
    const el = document.getElementById('preview-content');
    
    container.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2) {
            // Hitung jarak awal antara dua jari
            lastDist = Math.hypot(
                e.touches[0].pageX - e.touches[1].pageX,
                e.touches[0].pageY - e.touches[1].pageY
            );
        }
    });

    container.addEventListener('touchmove', (e) => {
        if (e.touches.length === 2) {
            e.preventDefault();
            
            // Hitung jarak baru
            const dist = Math.hypot(
                e.touches[0].pageX - e.touches[1].pageX,
                e.touches[0].pageY - e.touches[1].pageY
            );

            // Hitung titik tengah (focal point)
            const midX = (e.touches[0].pageX + e.touches[1].pageX) / 2;
            const midY = (e.touches[0].pageY + e.touches[1].pageY) / 2;

            // Atur transform origin agar mengikuti posisi jari
            const rect = el.getBoundingClientRect();
            const offsetX = ((midX - rect.left) / rect.width) * 100;
            const offsetY = ((midY - rect.top) / rect.height) * 100;
            
            el.style.transformOrigin = `${offsetX}% ${offsetY}%`;

            // Hitung skala baru
            scale = lastScale * (dist / lastDist);
            
            // Batasi zoom (min 1x, max 4x)
            if (scale < 1) scale = 1;
            if (scale > 4) scale = 4;

            el.style.transform = `scale(${scale})`;
        }
    }, { passive: false });

    container.addEventListener('touchend', () => {
        lastScale = scale;
    });
}

</script>

</body>
</html>
